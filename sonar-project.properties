sonar.projectKey=claude-monitor
sonar.projectName=claude-insights
sonar.projectVersion=1.0.0

# Sources
sonar.sources=.
sonar.inclusions=**/*.py,**/*.sh
sonar.exclusions=tests/**,dist/**,.venv/**,__pycache__/**,*.pyc

# Tests
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py,tests/**/*.bats

# Coverage (pytest-cov generates this)
sonar.python.coverage.reportPaths=coverage.xml

# Language
sonar.language=py

# Encoding
sonar.sourceEncoding=UTF-8
