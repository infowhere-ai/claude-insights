sonar.projectKey=claude-monitor
sonar.projectName=claude-insights
sonar.projectVersion=1.0.0b1
sonar.python.version=3.12

# Sources
sonar.sources=claude_monitor,claude_insights
sonar.inclusions=**/*.py
sonar.exclusions=dist/**,.venv/**,__pycache__/**,*.pyc

# Tests
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Coverage (pytest-cov generates this)
sonar.python.coverage.reportPaths=coverage.xml

# Language
sonar.language=py

# Encoding
sonar.sourceEncoding=UTF-8
