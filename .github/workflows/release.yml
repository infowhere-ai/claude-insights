name: release

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build binaries ──────────────────────────────────────────────────────

  build-macos:
    name: Build macOS binary (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-latest          # Apple Silicon runners are arm64
          - arch: x86_64
            runner: macos-13              # Last Intel runner

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: |
          pip install fastapi "uvicorn[standard]" pyinstaller httpx anyio

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name claude-insights \
            --add-data "static:static" \
            app.py

      - name: Rename binary
        run: mv dist/claude-insights dist/claude-insights-macos-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos-${{ matrix.arch }}
          path: dist/claude-insights-macos-${{ matrix.arch }}

  build-linux:
    name: Build Linux binary (x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: |
          pip install fastapi "uvicorn[standard]" pyinstaller httpx anyio

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name claude-insights \
            --add-data "static:static" \
            app.py

      - name: Rename binary
        run: mv dist/claude-insights dist/claude-insights-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-x86_64
          path: dist/claude-insights-linux-x86_64

  # ── 2. Build Python wheel ──────────────────────────────────────────────────

  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install hatchling
          python -m hatchling build --target wheel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  # ── 3. Create GitHub Release ───────────────────────────────────────────────

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-wheel]
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.release.outputs.upload_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Compute SHA256 checksums
        id: sha
        run: |
          SHA_ARM64=$(sha256sum artifacts/binary-macos-arm64/claude-insights-macos-arm64 | awk '{print $1}')
          SHA_X86_64=$(sha256sum artifacts/binary-macos-x86_64/claude-insights-macos-x86_64 | awk '{print $1}')
          echo "sha_macos_arm64=$SHA_ARM64" >> "$GITHUB_OUTPUT"
          echo "sha_macos_x86_64=$SHA_X86_64" >> "$GITHUB_OUTPUT"

      - name: Create release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: claude-insights v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'b') || contains(steps.version.outputs.version, 'a') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            artifacts/binary-macos-arm64/claude-insights-macos-arm64
            artifacts/binary-macos-x86_64/claude-insights-macos-x86_64
            artifacts/binary-linux-x86_64/claude-insights-linux-x86_64
            artifacts/python-wheel/*.whl
          body: |
            ## claude-insights v${{ steps.version.outputs.version }}

            ### Install

            **macOS (Homebrew)**
            ```bash
            brew tap infowhere-be/claude-insights
            brew install claude-insights
            ```

            **Linux / macOS (curl)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/infowhere-be/claude-monitor/main/install.sh | bash
            ```

            **Python (pipx)**
            ```bash
            pipx install claude-insights
            ```

            ### SHA256 checksums
            | File | SHA256 |
            |------|--------|
            | claude-insights-macos-arm64 | `${{ steps.sha.outputs.sha_macos_arm64 }}` |
            | claude-insights-macos-x86_64 | `${{ steps.sha.outputs.sha_macos_x86_64 }}` |

  # ── 4. Publish to Nexus PyPI ───────────────────────────────────────────────

  publish-pypi:
    name: Publish to Nexus PyPI
    runs-on: self-hosted
    needs: [release]

    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/

      - name: Publish to Nexus
        run: |
          pip install twine
          twine upload \
            --repository-url "${{ secrets.NEXUS_PYPI_URL }}" \
            --username "${{ secrets.NEXUS_USERNAME }}" \
            --password "${{ secrets.NEXUS_PASSWORD }}" \
            dist/*.whl

  # ── 5. Publish .deb to Nexus APT ──────────────────────────────────────────

  publish-deb:
    name: Build and publish .deb to Nexus APT
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64
          path: artifacts/

      - name: Build .deb package
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          bash dist/build-deb.sh "artifacts/claude-insights-linux-x86_64" "$VERSION"

      - name: Publish to Nexus APT
        run: |
          curl -u "${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }}" \
            --upload-file dist/claude-insights_*.deb \
            "${{ secrets.NEXUS_APT_URL }}/claude-insights_${VERSION}_amd64.deb"

  # ── 6. Update Homebrew formula ─────────────────────────────────────────────

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - uses: actions/checkout@v4
        with:
          repository: infowhere-be/homebrew-claude-insights
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Regenerate formula
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          SHA_ARM64="${{ needs.release.outputs.sha_macos_arm64 }}"
          SHA_X86_64="${{ needs.release.outputs.sha_macos_x86_64 }}"
          bash dist/update-homebrew-formula.sh "$VERSION" "$SHA_ARM64" "$SHA_X86_64" homebrew-tap/Formula/claude-insights.rb

      - name: Commit and push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-insights.rb
          git commit -m "chore: update claude-insights to v${{ needs.release.outputs.version }}"
          git push
