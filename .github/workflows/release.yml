name: release

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build macOS binary (arm64) ──────────────────────────────────────────

  build-macos:
    name: Build macOS binary (arm64)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: pip install fastapi "uvicorn[standard]" pyinstaller httpx anyio

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name claude-insights \
            --add-data "static:static" \
            app.py

      - name: Rename binary
        run: mv dist/claude-insights dist/claude-insights-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos-arm64
          path: dist/claude-insights-macos-arm64

  # ── 2. Build Linux binary (x86_64) ────────────────────────────────────────

  build-linux:
    name: Build Linux binary (x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: pip install fastapi "uvicorn[standard]" pyinstaller httpx anyio

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name claude-insights \
            --add-data "static:static" \
            app.py

      - name: Rename binary
        run: mv dist/claude-insights dist/claude-insights-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-x86_64
          path: dist/claude-insights-linux-x86_64

  # ── 3. Build Python wheel ──────────────────────────────────────────────────

  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install hatchling
          python -m hatchling build --target wheel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  # ── 4. Smoke test — validate artefacts before releasing ───────────────────

  smoke-test:
    name: Smoke test artefacts
    runs-on: ubuntu-latest
    needs: [build-linux, build-wheel]

    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: artifacts/

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64
          path: artifacts/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install wheel via pipx
        run: |
          pip install pipx
          pipx install artifacts/*.whl

      - name: Create mock project
        run: |
          mkdir -p /tmp/test-root/smoke-project/.claude
          echo '{"status":"idle","tool":null,"file":null}' \
            > /tmp/test-root/smoke-project/.claude/status.json

      - name: Start server in background
        run: |
          PROJECTS_ROOT=/tmp/test-root \
          ~/.local/bin/claude-insights start --port 4000 &
          echo $! > /tmp/server.pid

      - name: Wait for server ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:4000/health && { echo "Server ready after ${i}s"; break; }
            [ $i -eq 30 ] && { echo "Timed out waiting for server"; exit 1; }
            sleep 1
          done

      - name: Health check
        run: |
          RESP=$(curl -sf http://localhost:4000/health)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'unexpected status: {d}'
          print(f'OK -- {d[\"projects_monitored\"]} project(s) monitored')
          "

      - name: API status check
        run: |
          curl -sf http://localhost:4000/api/status | python3 -c "
          import json, sys
          projects = json.load(sys.stdin)
          print(f'Projects returned: {len(projects)}')
          "

      - name: Linux binary is a valid ELF executable
        run: |
          chmod +x artifacts/claude-insights-linux-x86_64
          file artifacts/claude-insights-linux-x86_64 | grep -q ELF
          echo "Binary is a valid ELF executable"

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid 2>/dev/null) 2>/dev/null || true

  # ── 5. Create GitHub Release ───────────────────────────────────────────────

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-wheel, smoke-test]
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_macos_arm64: ${{ steps.sha.outputs.sha_macos_arm64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Compute SHA256 checksums
        id: sha
        run: |
          SHA=$(sha256sum artifacts/binary-macos-arm64/claude-insights-macos-arm64 | awk '{print $1}')
          echo "sha_macos_arm64=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: claude-insights v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'b') || contains(steps.version.outputs.version, 'a') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            artifacts/binary-macos-arm64/claude-insights-macos-arm64
            artifacts/binary-linux-x86_64/claude-insights-linux-x86_64
            artifacts/python-wheel/*.whl
          body: |
            ## claude-insights v${{ steps.version.outputs.version }}

            ### Install

            **macOS — Apple Silicon (Homebrew)**
            ```bash
            brew tap infowhere-ai/claude-insights
            brew install claude-insights
            ```

            **Linux / macOS (curl)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/infowhere-ai/claude-insights/main/install.sh | bash
            ```

            **Python — all platforms (pipx)**
            ```bash
            pipx install claude-insights
            ```

            > macOS Intel users: use `pipx install claude-insights` (no native binary for Intel yet).

            ### SHA256 checksums
            | File | SHA256 |
            |------|--------|
            | claude-insights-macos-arm64 | `${{ steps.sha.outputs.sha_macos_arm64 }}` |

  # ── 6. Publish to PyPI ─────────────────────────────────────────────────────

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [release]
    environment:
      name: pypi
      url: https://pypi.org/project/claude-insights/

    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 7. Build .deb and attach to release ────────────────────────────────────

  publish-deb:
    name: Build and attach .deb to release
    runs-on: ubuntu-latest
    needs: [release]

    permissions:
      contents: write  # required to upload release assets

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64
          path: artifacts/

      - name: Build .deb package
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: bash dist/build-deb.sh "artifacts/claude-insights-linux-x86_64" "$VERSION"

      - name: Upload .deb to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          gh release upload "v${VERSION}" \
            "dist/claude-insights_${VERSION}_amd64.deb" \
            --clobber

  # ── 8. Update Homebrew formula ─────────────────────────────────────────────

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: infowhere-ai/homebrew-claude-insights
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Regenerate formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA_ARM64: ${{ needs.release.outputs.sha_macos_arm64 }}
        run: |
          bash dist/update-homebrew-formula.sh \
            "$VERSION" "$SHA_ARM64" \
            homebrew-tap/Formula/claude-insights.rb

      - name: Commit and push formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-insights.rb
          git commit -m "chore: update claude-insights to v${VERSION}"
          git push
