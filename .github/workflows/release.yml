name: release

on:
  push:
    branches: [main]

jobs:
  # ── 1. Build macOS universal binary (arm64 + x86_64) ──────────────────────

  build-macos:
    name: Build macOS universal binary
    runs-on: macos-latest   # arm64 runner; setup-python installs universal2 Python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (universal2)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: pip install fastapi "uvicorn[standard]" pyinstaller httpx anyio

      - name: Build universal binary
        run: |
          pyinstaller \
            --onefile \
            --name claude-insights \
            --add-data "static:static" \
            --target-architecture universal2 \
            app.py

      - name: Rename binary
        run: mv dist/claude-insights dist/claude-insights-macos-universal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-macos-universal
          path: dist/claude-insights-macos-universal

  # ── 2. Build Linux binary (x86_64) ────────────────────────────────────────

  build-linux:
    name: Build Linux binary (x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + PyInstaller
        run: pip install fastapi "uvicorn[standard]" pyinstaller httpx anyio

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name claude-insights \
            --add-data "static:static" \
            app.py

      - name: Rename binary
        run: mv dist/claude-insights dist/claude-insights-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-x86_64
          path: dist/claude-insights-linux-x86_64

  # ── 3. Build Python wheel ──────────────────────────────────────────────────

  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install hatchling
          python -m hatchling build --target wheel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/*.whl

  # ── 4. Create GitHub Release ───────────────────────────────────────────────

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-wheel]
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      sha_macos_universal: ${{ steps.sha.outputs.sha_macos_universal }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Compute SHA256 checksums
        id: sha
        run: |
          SHA=$(sha256sum artifacts/binary-macos-universal/claude-insights-macos-universal | awk '{print $1}')
          echo "sha_macos_universal=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: claude-insights v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'b') || contains(steps.version.outputs.version, 'a') || contains(steps.version.outputs.version, 'rc') }}
          files: |
            artifacts/binary-macos-universal/claude-insights-macos-universal
            artifacts/binary-linux-x86_64/claude-insights-linux-x86_64
            artifacts/python-wheel/*.whl
          body: |
            ## claude-insights v${{ steps.version.outputs.version }}

            ### Install

            **macOS (Homebrew)**
            ```bash
            brew tap infowhere-be/claude-insights
            brew install claude-insights
            ```

            **Linux / macOS (curl)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/infowhere-be/claude-monitor/main/install.sh | bash
            ```

            **Python (pipx)**
            ```bash
            pipx install claude-insights
            ```

            ### SHA256 checksums
            | File | SHA256 |
            |------|--------|
            | claude-insights-macos-universal | `${{ steps.sha.outputs.sha_macos_universal }}` |

  # ── 5. Publish to Nexus PyPI ───────────────────────────────────────────────

  publish-pypi:
    name: Publish to Nexus PyPI
    runs-on: self-hosted
    needs: [release]

    steps:
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/

      - name: Publish to Nexus
        run: |
          pip install twine
          twine upload \
            --repository-url "${{ secrets.NEXUS_PYPI_URL }}" \
            --username "${{ secrets.NEXUS_USERNAME }}" \
            --password "${{ secrets.NEXUS_PASSWORD }}" \
            dist/*.whl

  # ── 6. Publish .deb to Nexus APT ──────────────────────────────────────────

  publish-deb:
    name: Build and publish .deb to Nexus APT
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64
          path: artifacts/

      - name: Build .deb package
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: bash dist/build-deb.sh "artifacts/claude-insights-linux-x86_64" "$VERSION"

      - name: Publish to Nexus APT
        env:
          VERSION: ${{ needs.release.outputs.version }}
          NEXUS_USER: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASS: ${{ secrets.NEXUS_PASSWORD }}
          NEXUS_APT_URL: ${{ secrets.NEXUS_APT_URL }}
        run: |
          curl -u "${NEXUS_USER}:${NEXUS_PASS}" \
            --upload-file "dist/claude-insights_${VERSION}_amd64.deb" \
            "${NEXUS_APT_URL}/claude-insights_${VERSION}_amd64.deb"

  # ── 7. Update Homebrew formula ─────────────────────────────────────────────

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - uses: actions/checkout@v4
        with:
          repository: infowhere-be/homebrew-claude-insights
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Regenerate formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          SHA_UNIVERSAL: ${{ needs.release.outputs.sha_macos_universal }}
        run: |
          bash dist/update-homebrew-formula.sh \
            "$VERSION" "$SHA_UNIVERSAL" \
            homebrew-tap/Formula/claude-insights.rb

      - name: Commit and push formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-insights.rb
          git commit -m "chore: update claude-insights to v${VERSION}"
          git push
