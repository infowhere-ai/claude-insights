name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint and format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ --ignore=tests/e2e -v --tb=short --cov-fail-under=80

      - name: Smoke-test package imports
        if: matrix.python-version == '3.12'
        run: |
          python -c "
          from claude_monitor.main import app
          from claude_monitor.terminal.ws import router
          from claude_monitor.git_ops.router import router as git_router
          from claude_monitor.sessions.router import router as sess_router
          from claude_monitor.stats.router import router as stats_router
          from claude_monitor.files.router import router as files_router
          from claude_monitor.context.router import router as ctx_router
          print('All routers imported successfully')
          "

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

  test-e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Run E2E tests
        run: pytest tests/e2e/ --rootdir=tests/e2e --timeout=30 -v --tb=short

  sonar:
    name: SonarQube quality gate
    runs-on: self-hosted
    needs: [test]
    # Only run on the original repo — forks and external contributors don't have these secrets
    if: github.repository == 'infowhere-ai/claude-insights' && github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube quality gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
