name: Bug Report
description: Report a bug in claude-insights
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, check [existing issues](https://github.com/infowhere-ai/claude-insights/issues).
        For security vulnerabilities, see [SECURITY.md](../../SECURITY.md).

  - type: input
    id: version
    attributes:
      label: claude-insights version
      placeholder: "e.g. 1.0.0b1  (run: claude-insights --version)"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the dashboard with ...
        2. Open ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text
